services:
  mongodb:
    image: mongo:7
    container_name: farmaceutica_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: farmaceutica
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1
    container_name: farmaceutica_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  neo4j:
    image: neo4j:5
    container_name: farmaceutica_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/farmaceutica
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "farmaceutica", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  mongo_data:
  neo4j_data:
